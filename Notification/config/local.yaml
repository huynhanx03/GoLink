server:
  port: 2104
  grpc_port: 2204
  mode: "dev"
  host: "localhost"

mongodb:
  host: localhost
  port: 2013
  username: admin
  password: admin
  database: notification
  timeout: 10
  max_pool_size: 50
  min_pool_size: 5
  max_conn_idle_time: 300

redis:
  addrs:
    - "localhost:2005"
  password: ""
  database: 0
  pool_size: 100
  min_idle_conns: 5
  pool_timeout: 5
  dial_timeout: 5
  read_timeout: 3
  write_timeout: 3
  max_retries: 3
  max_retry_backoff: 500
  min_retry_backoff: 300

kafka:
  brokers:
    - "localhost:2008"

  flush_frequency: 500
  flush_bytes: 16384
  max_message_bytes: 1000000
  timeout: 10
  max_retries: 3
  retry_backoff: 100
  max_processing_time: 600
  consumer_batch_size: 100
  consumer_batch_interval: 1000

logger:
  log_level: debug
  file_log_name: "./storages/logs/app.log"
  max_backups: 30
  max_age: 7
  max_size: 1024
  compress: true

jwt:
  public_key_path: "certs/public_key.pem"

resend:
  api_key: ""
  from_email: "noreply@golink.dev"
  from_name: "GoLink"
